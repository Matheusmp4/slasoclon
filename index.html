<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Descubra Seu Nível de Acesso | Primetal</title>
  <meta name="description" content="Responda o teste rápido e descubra se o seu perfil está pronto para acessar o mercado de ouro dos leilões públicos." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
:root{
  --navy:#050d28;
  --navy-soft:#2a2f45;
  --gold:#cfb25e;
  --gold-dark:#a9863a;
  --green:#0c7a35;
  --green-dark:#08551f;
  --cream:#f4f1e9;
  --card:#ffffff;
  --text:#1b2233;
  --muted:#7c8091;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  font-family:"Poppins",Arial,sans-serif;
  color:var(--text);
  background:linear-gradient(180deg,#fbf9f4 0%,var(--cream) 100%);
  display:flex;
  flex-direction:column;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ===== HEADER / LOGO ===== */
.q-header{
  padding:30px 20px 6px;
  text-align:center;
}
.brand{
  display:inline-flex;
  align-items:center;
  gap:13px;
}
.brand__mark{width:38px;height:38px;flex:0 0 38px}
.brand__mark svg{width:38px;height:38px;display:block}
.brand__name{text-align:left;line-height:1}
.brand__name strong{
  display:block;
  font-size:1.18rem;font-weight:700;letter-spacing:5px;
  color:var(--navy);
}
.brand__name span{
  display:block;
  margin-top:5px;
  font-size:.56rem;font-weight:600;letter-spacing:4px;
  color:var(--gold-dark);
  text-transform:uppercase;
}

/* ===== PROGRESS ===== */
.q-shell{
  width:min(660px,calc(100% - 44px));
  margin:34px auto 0;
  flex:1 0 auto;
}
.q-progress{
  height:6px;
  border-radius:999px;
  background:rgba(169,134,58,.16);
  overflow:hidden;
}
.q-progress__fill{
  height:100%;
  width:12%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--gold),var(--gold-dark));
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.q-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:14px;
  font-size:.8rem;
  font-weight:600;
  letter-spacing:.2px;
}
.q-meta__step{color:var(--gold-dark)}
.q-meta__compat{color:var(--navy)}
.q-meta__compat b{color:var(--green)}

/* ===== STAGE ===== */
.q-stage{
  padding:64px 0 70px;
  min-height:54vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.q-question{
  margin:0 0 46px;
  text-align:center;
  font-size:clamp(1.32rem,2.7vw,1.8rem);
  line-height:1.4;
  font-weight:600;
  letter-spacing:-.2px;
  color:var(--navy);
  max-width:34ch;
  margin-inline:auto;
}
.q-options{
  display:flex;
  flex-direction:column;
  gap:16px;
}
.q-option{
  display:flex;
  align-items:center;
  gap:16px;
  width:100%;
  text-align:left;
  padding:22px 24px;
  border-radius:16px;
  border:1.5px solid #e9e4d6;
  background:var(--card);
  color:var(--navy);
  font-family:inherit;
  font-size:clamp(.98rem,1.7vw,1.08rem);
  font-weight:600;
  letter-spacing:.1px;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(5,13,40,.04);
  transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease;
}
.q-option:hover{
  transform:translateY(-2px);
  border-color:var(--gold);
  box-shadow:0 12px 26px rgba(207,178,94,.16);
}
.q-option:disabled{cursor:default}
.q-option.is-picked{
  border-color:var(--green);
  box-shadow:0 12px 26px rgba(12,122,53,.14);
}
.q-option__ico{
  flex:0 0 22px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;
  color:var(--gold-dark);
}
.q-option__ico svg{width:20px;height:20px;display:block}
.q-option.is-picked .q-option__ico{color:var(--green)}

/* ===== TOAST (notificação de dopamina, não-bloqueante) ===== */
.q-toast{
  position:fixed;
  left:50%;
  bottom:28px;
  transform:translate(-50%,150%);
  z-index:60;
  display:flex;
  align-items:center;
  gap:12px;
  max-width:min(440px,calc(100% - 28px));
  padding:14px 20px;
  border-radius:15px;
  background:var(--navy);
  color:#fff;
  box-shadow:0 20px 44px rgba(5,13,40,.32);
  font-size:.92rem;font-weight:600;line-height:1.35;letter-spacing:.1px;
  opacity:0;
  transition:transform .5s cubic-bezier(.2,.9,.3,1), opacity .35s ease;
}
.q-toast.is-show{transform:translate(-50%,0);opacity:1}
.q-toast__ico{
  flex:0 0 26px;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  background:var(--green);
}
.q-toast__ico svg{width:15px;height:15px;color:#fff}

/* ===== ANALYZE / RESULT ===== */
.q-analyze,.q-result{
  text-align:center;
  padding:64px 0 70px;
  min-height:56vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
}
.q-spinner{
  width:58px;height:58px;
  border-radius:50%;
  border:4px solid rgba(169,134,58,.2);
  border-top-color:var(--gold);
  animation:spin 1s linear infinite;
}
.q-analyze p{margin:0;color:var(--navy);font-size:clamp(1.1rem,2.4vw,1.4rem);font-weight:700}
.q-analyze small{color:var(--muted);font-weight:500}
.q-result__tag{
  display:inline-flex;align-items:center;gap:8px;
  padding:9px 20px;border-radius:999px;
  background:rgba(12,122,53,.1);
  color:var(--green);
  font-size:.82rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
}
.q-result__tag svg{width:15px;height:15px}
.q-result__badge{
  width:88px;height:88px;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  background:linear-gradient(180deg,var(--green),var(--green-dark));
  color:#fff;box-shadow:0 18px 40px rgba(12,122,53,.3);
  animation:pop .5s cubic-bezier(.2,1.4,.5,1) both;
}
.q-result__badge svg{width:46px;height:46px}
.q-result h2{
  margin:0;
  font-size:clamp(1.55rem,4.2vw,2.35rem);
  line-height:1.2;font-weight:800;color:var(--navy);
  letter-spacing:-.4px;
  max-width:20ch;
}
.q-result h2 span{color:var(--gold-dark)}
.q-result__score{
  margin:0;
  font-size:clamp(1rem,2.2vw,1.2rem);
  font-weight:600;color:var(--navy);
}
.q-result__score b{color:var(--green)}
.q-result__text{
  margin:0 auto;max-width:52ch;
  color:#454b5c;font-size:clamp(.98rem,2.1vw,1.12rem);
  line-height:1.6;font-weight:400;
}
.q-cta{
  display:inline-flex;align-items:center;justify-content:center;
  margin-top:10px;
  min-height:60px;
  padding:0 36px;
  border-radius:12px;
  background:linear-gradient(180deg,var(--green),var(--green-dark));
  color:#fff;text-decoration:none;text-transform:uppercase;
  font-size:clamp(.98rem,2.2vw,1.15rem);font-weight:800;letter-spacing:.5px;
  box-shadow:0 16px 32px rgba(12,122,53,.28);
  animation:pulse 2.2s ease-in-out infinite;
  max-width:100%;
}
.q-cta:hover{filter:brightness(1.06);transform:translateY(-2px)}
.q-secure{
  display:inline-flex;align-items:center;gap:7px;
  color:var(--muted);font-size:.8rem;font-weight:500;
}
.q-secure svg{width:15px;height:15px;color:var(--gold-dark)}

/* ===== FOOTER ===== */
.q-footer{
  margin-top:auto;
  padding:30px 20px 34px;
  text-align:center;
  border-top:1px solid rgba(5,13,40,.06);
}
.q-footer p{
  margin:0 auto 10px;max-width:640px;
  color:var(--muted);font-size:.76rem;line-height:1.55;font-weight:400;
}
.q-footer a{color:var(--gold-dark);font-weight:600;text-decoration:none;font-size:.8rem}

/* ===== ANIM ===== */
.fade-in{animation:fadeIn .45s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pop{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(12,122,53,.4),0 16px 32px rgba(12,122,53,.28)}50%{box-shadow:0 0 0 14px rgba(12,122,53,0),0 16px 32px rgba(12,122,53,.28)}}
@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:opacity .2s ease !important}
}
@media (max-width:540px){
  .q-shell{margin-top:26px}
  .q-stage{padding:44px 0 60px;min-height:48vh}
  .q-question{margin-bottom:36px}
  .q-option{padding:19px 20px}
  .q-toast{bottom:18px}
}
  </style>
</head>
<body>
  <header class="q-header">
    <div class="brand">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 40 40">
          <defs>
            <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#eef0f4"/>
              <stop offset=".45" stop-color="#c2c6cf"/>
              <stop offset="1" stop-color="#8b909d"/>
            </linearGradient>
          </defs>
          <path d="M20 3l9.5 9-9.5 25-9.5-25L20 3z" fill="url(#silver)" stroke="#ffffff" stroke-width=".6" stroke-linejoin="round"/>
          <path d="M10.5 12h19M20 3v34M14.7 12L20 37M25.3 12L20 37" stroke="#ffffff" stroke-width=".5" opacity=".45"/>
        </svg>
      </span>
      <span class="brand__name">
        <strong>PRIMETAL</strong>
        <span>Metais Nobres</span>
      </span>
    </div>
  </header>

  <main class="q-shell">
    <div class="q-progress"><div class="q-progress__fill" id="progressFill"></div></div>
    <div class="q-meta">
      <span class="q-meta__step" id="stepLabel">Pergunta 1 de 8</span>
      <span class="q-meta__compat">Compatibilidade: <b id="compatLabel">12%</b></span>
    </div>

    <section id="quizArea" aria-live="polite"></section>
  </main>

  <footer class="q-footer">
    <p>A Primetal é independente e não possui vínculo com a Caixa Econômica Federal. Conteúdo educativo; resultados variam conforme a dedicação de cada pessoa.</p>
    <a href="#">Política de Privacidade</a>
  </footer>

  <script>
  // ==== LINK DA PÁGINA DE VENDAS (marca o perfil como aprovado) ====
  const SALES_PAGE = "index_1.html?perfil=ideal#perfil-ideal";

  const ICON_DIAMOND = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3l4 5-4 13-4-13 4-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 8h8" stroke="currentColor" stroke-width="1.5"/></svg>';
  const ICON_CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

  const QUIZ = [
    {
      q: "Você sabia que existe um mercado de ouro dentro dos leilões públicos que quase ninguém conhece?",
      options: [
        { t:"Sim, já ouvi falar", r:"Boa! Isso já te coloca à frente de quem nunca ouviu falar." },
        { t:"Não, isso é novidade pra mim", r:"Você chegou na hora certa de descobrir." }
      ]
    },
    {
      q: "O que mais te impede de aproveitar oportunidades como essa hoje?",
      options: [
        { t:"Não sei por onde começar", r:"Tranquilo — é exatamente isso que o método resolve." },
        { t:"Tenho medo de errar e perder dinheiro", r:"Medo bom: é ele que protege quem aprende do jeito certo." },
        { t:"Acho que é complicado demais", r:"É mais simples do que parece. Você vai ver." },
        { t:"Nunca tive um passo a passo claro", r:"Então esse é justamente o que faltava pra você." }
      ]
    },
    {
      q: "Se você pudesse enxergar essas oportunidades antes da maioria, isso mudaria sua forma de comprar ouro?",
      options: [
        { t:"Sim, com certeza", r:"É assim que os que compram melhor pensam." },
        { t:"Talvez, se fosse simples", r:"Boa notícia: simples é o nosso padrão." }
      ]
    },
    {
      q: "Com um método simples e direto, você se sentiria pronto pra dar o primeiro lance com segurança?",
      options: [
        { t:"Sim, total", r:"Essa confiança já é o seu primeiro lance vencedor." },
        { t:"Provavelmente sim", r:"Com o passo a passo certo, vira 'com certeza'." }
      ]
    },
    {
      q: "O que faria mais diferença pra você agora?",
      options: [
        { t:"Entender como esse mercado funciona", r:"A base de tudo. Você pensa como investidor." },
        { t:"Saber avaliar uma peça em segundos", r:"A habilidade que mais economiza dinheiro." },
        { t:"Evitar os erros que custam caro", r:"Inteligente. Quem evita erro, multiplica lucro." },
        { t:"Tudo isso junto", r:"Resposta de quem quer resultado de verdade." }
      ]
    },
    {
      q: "Você concorda que quem sabe avaliar corretamente compra por muito menos do que quem ‘vai na confiança’?",
      options: [
        { t:"Com certeza", r:"Exato. Conhecimento é o maior desconto que existe." },
        { t:"Sim, faz total sentido", r:"É por isso que avaliar bem muda o jogo." }
      ]
    },
    {
      q: "Faz mais sentido aprender com quem já vive esse mercado todos os dias — em vez de tentar sozinho e correr o risco?",
      options: [
        { t:"Sim, com certeza", r:"Atalho inteligente: aprender com quem já faz." },
        { t:"Prefiro aprender com quem já faz", r:"Decisão de quem economiza tempo e dinheiro." }
      ]
    },
    {
      q: "Você está pronto pra ter acesso a esse olhar antes que mais gente descubra?",
      options: [
        { t:"Sim, estou pronto!", r:"É isso! Confirmando o seu perfil agora." },
        { t:"Sim, quero começar agora", r:"Perfeito! Preparando o seu acesso." }
      ]
    }
  ];

  const total = QUIZ.length;
  let current = 0;
  let toastTimer;

  const area = document.getElementById("quizArea");
  const fill = document.getElementById("progressFill");
  const stepLabel = document.getElementById("stepLabel");
  const compatLabel = document.getElementById("compatLabel");

  function compatFor(answered){
    return Math.min(99, Math.round(12 + (answered / total) * 87));
  }
  function setProgress(answered){
    fill.style.width = Math.max(12, Math.round((answered/total)*100)) + "%";
    compatLabel.textContent = compatFor(answered) + "%";
    stepLabel.textContent = "Pergunta " + Math.min(current+1, total) + " de " + total;
  }

  function toast(msg){
    let el = document.getElementById("qToast");
    if (!el){
      el = document.createElement("div");
      el.id = "qToast";
      el.className = "q-toast";
      el.innerHTML = '<span class="q-toast__ico">'+ICON_CHECK+'</span><span class="q-toast__msg"></span>';
      document.body.appendChild(el);
    }
    el.querySelector(".q-toast__msg").textContent = msg;
    // reinicia a animação de entrada
    el.classList.remove("is-show");
    void el.offsetWidth;
    el.classList.add("is-show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("is-show"), 2400);
  }

  function renderQuestion(){
    const item = QUIZ[current];
    setProgress(current);
    area.className = "q-stage fade-in";
    area.innerHTML =
      '<h1 class="q-question">' + item.q + '</h1>' +
      '<div class="q-options">' +
      item.options.map((o,i) =>
        '<button class="q-option" data-i="'+i+'">' +
        '<span class="q-option__ico">'+ICON_DIAMOND+'</span>' +
        '<span>'+o.t+'</span></button>'
      ).join("") +
      '</div>';

    area.querySelectorAll(".q-option").forEach(btn => {
      btn.addEventListener("click", () => choose(parseInt(btn.dataset.i,10), btn));
    });
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function choose(i, btn){
    const item = QUIZ[current];
    area.querySelectorAll(".q-option").forEach(b => b.disabled = true);
    btn.classList.add("is-picked");
    btn.querySelector(".q-option__ico").innerHTML = ICON_CHECK;

    const answered = current + 1;
    setProgress(answered);
    toast(item.options[i].r);

    // avança rápido, sem tela intermediária
    setTimeout(() => {
      if (current + 1 >= total){
        analyze();
      } else {
        current++;
        renderQuestion();
      }
    }, 430);
  }

  function analyze(){
    fill.style.width = "100%";
    compatLabel.textContent = "98%";
    stepLabel.textContent = "Análise final";
    area.className = "q-analyze fade-in";
    area.innerHTML =
      '<div class="q-spinner"></div>' +
      '<p>Analisando suas respostas...</p>' +
      '<small>Calculando seu nível de compatibilidade</small>';
    window.scrollTo({top:0,behavior:"smooth"});
    setTimeout(showResult, 2200);
  }

  function showResult(){
    area.className = "q-result fade-in";
    area.innerHTML =
      '<span class="q-result__tag">'+ICON_CHECK+' Perfil aprovado</span>' +
      '<span class="q-result__badge">'+ICON_CHECK+'</span>' +
      '<h2>Seu perfil é <span>IDEAL</span> para o Método Primetal</h2>' +
      '<p class="q-result__score">Compatibilidade: <b>98%</b></p>' +
      '<p class="q-result__text">Pelas suas respostas, você tem exatamente o perfil de quem aproveita as melhores oportunidades de ouro nos leilões. Seu acesso está liberado — garanta agora antes que mais gente descubra.</p>' +
      '<a class="q-cta" href="'+SALES_PAGE+'">LIBERAR MEU ACESSO AGORA</a>' +
      '<span class="q-secure"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg> Acesso 100% seguro</span>';
    window.scrollTo({top:0,behavior:"smooth"});
  }

  renderQuestion();
  </script>
</body>
</html>
